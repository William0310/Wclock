<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Clock</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="rain-layer" id="rain" aria-hidden="true"></div>
    <main class="clock-shell">
      <section class="clock-card" aria-label="当前时间">
        <p class="clock-label">Current Time</p>
        <h1 class="clock-time" id="time">00:00:00</h1>
        <p class="clock-date" id="date">正在加载日期...</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
